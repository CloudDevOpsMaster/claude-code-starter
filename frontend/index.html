<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ToDo App — Claude Code Starter</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #0f0f11;
      color: #e0e0e0;
      min-height: 100vh;
      padding: 2rem;
    }

    header {
      text-align: center;
      margin-bottom: 2rem;
    }

    header h1 {
      font-size: 2rem;
      background: linear-gradient(135deg, #a78bfa, #60a5fa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    header p {
      color: #888;
      margin-top: 0.5rem;
      font-size: 0.9rem;
    }

    .container { max-width: 640px; margin: 0 auto; }

    .card {
      background: #1a1a2e;
      border: 1px solid #2d2d44;
      border-radius: 12px;
      padding: 1.5rem;
      margin-bottom: 1.5rem;
    }

    .card h2 {
      font-size: 1rem;
      color: #a78bfa;
      margin-bottom: 1rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .form-row {
      display: flex;
      gap: 0.75rem;
    }

    input[type="text"] {
      flex: 1;
      padding: 0.6rem 1rem;
      background: #0f0f1a;
      border: 1px solid #3d3d5c;
      border-radius: 8px;
      color: #e0e0e0;
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.2s;
    }

    input[type="text"]:focus { border-color: #a78bfa; }

    select {
      padding: 0.6rem 0.75rem;
      background: #0f0f1a;
      border: 1px solid #3d3d5c;
      border-radius: 8px;
      color: #e0e0e0;
      font-size: 0.9rem;
      outline: none;
    }

    button {
      padding: 0.6rem 1.2rem;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 0.9rem;
      font-weight: 600;
      transition: all 0.2s;
    }

    .btn-primary {
      background: linear-gradient(135deg, #a78bfa, #7c3aed);
      color: white;
    }

    .btn-primary:hover { opacity: 0.85; transform: translateY(-1px); }

    .filters {
      display: flex;
      gap: 0.5rem;
      margin-bottom: 1rem;
    }

    .filter-btn {
      padding: 0.4rem 0.8rem;
      background: #0f0f1a;
      border: 1px solid #3d3d5c;
      color: #aaa;
      border-radius: 6px;
      font-size: 0.8rem;
    }

    .filter-btn.active {
      background: #a78bfa22;
      border-color: #a78bfa;
      color: #a78bfa;
    }

    #task-list { list-style: none; display: flex; flex-direction: column; gap: 0.5rem; }

    .task-item {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      padding: 0.75rem 1rem;
      background: #0f0f1a;
      border: 1px solid #2d2d44;
      border-radius: 8px;
      transition: border-color 0.2s;
    }

    .task-item:hover { border-color: #3d3d5c; }

    .task-item input[type="checkbox"] {
      width: 18px;
      height: 18px;
      cursor: pointer;
      accent-color: #a78bfa;
    }

    .task-title {
      flex: 1;
      font-size: 0.95rem;
    }

    .task-title.done {
      text-decoration: line-through;
      color: #555;
    }

    .priority-badge {
      font-size: 0.7rem;
      padding: 0.2rem 0.5rem;
      border-radius: 4px;
      font-weight: 600;
      text-transform: uppercase;
    }

    .priority-high { background: #ff444422; color: #ff6b6b; border: 1px solid #ff444444; }
    .priority-medium { background: #ffa50022; color: #ffa500; border: 1px solid #ffa50044; }
    .priority-low { background: #44ff4422; color: #6bff6b; border: 1px solid #44ff4444; }

    .btn-delete {
      background: transparent;
      color: #555;
      padding: 0.3rem 0.5rem;
      font-size: 1rem;
    }

    .btn-delete:hover { color: #ff6b6b; }

    .status-bar {
      text-align: center;
      color: #666;
      font-size: 0.8rem;
      margin-top: 0.5rem;
    }

    .error { color: #ff6b6b; font-size: 0.85rem; margin-top: 0.5rem; }
    .api-url { font-family: monospace; font-size: 0.75rem; color: #60a5fa; }
  </style>
</head>
<body>

<div class="container">
  <header>
    <h1>✅ ToDo App</h1>
    <p>Claude Code Starter — conectada a <span class="api-url">http://localhost:3000/api/tasks</span></p>
  </header>

  <div class="card">
    <h2>Nueva Tarea</h2>
    <div class="form-row">
      <input type="text" id="task-input" placeholder="¿Qué hay que hacer?" />
      <select id="priority-select">
        <option value="medium">Media</option>
        <option value="high">Alta</option>
        <option value="low">Baja</option>
      </select>
      <button class="btn-primary" onclick="createTask()">+ Agregar</button>
    </div>
    <div id="create-error" class="error"></div>
  </div>

  <div class="card">
    <h2>Tareas</h2>
    <div class="filters">
      <button class="filter-btn active" onclick="setFilter('all', this)">Todas</button>
      <button class="filter-btn" onclick="setFilter('pending', this)">Pendientes</button>
      <button class="filter-btn" onclick="setFilter('done', this)">Completadas</button>
    </div>
    <ul id="task-list"><li style="color:#555;text-align:center;padding:1rem;">Cargando...</li></ul>
    <div class="status-bar" id="status-bar"></div>
  </div>
</div>

<script>
  const API = 'http://localhost:3000/api/tasks';
  let currentFilter = 'all';

  async function loadTasks() {
    try {
      const url = currentFilter === 'all' ? API :
        currentFilter === 'done' ? `${API}?done=true` : `${API}?done=false`;

      const res = await fetch(url);
      const json = await res.json();

      const list = document.getElementById('task-list');
      const statusBar = document.getElementById('status-bar');

      if (!json.success || json.data.length === 0) {
        list.innerHTML = '<li style="color:#555;text-align:center;padding:1rem;">No hay tareas aquí.</li>';
        statusBar.textContent = '';
        return;
      }

      list.innerHTML = json.data.map(task => `
        <li class="task-item">
          <input type="checkbox" ${task.done ? 'checked' : ''}
            onchange="toggleDone(${task.id}, this.checked)" />
          <span class="task-title ${task.done ? 'done' : ''}">${escapeHtml(task.title)}</span>
          <span class="priority-badge priority-${task.priority}">${task.priority}</span>
          <button class="btn-delete" onclick="deleteTask(${task.id})" title="Eliminar">🗑</button>
        </li>
      `).join('');

      const done = json.data.filter(t => t.done).length;
      statusBar.textContent = `${done}/${json.total} completadas`;
    } catch (e) {
      document.getElementById('task-list').innerHTML =
        '<li style="color:#ff6b6b;text-align:center;padding:1rem;">⚠️ No se pudo conectar a la API. ¿Está corriendo el backend?</li>';
    }
  }

  async function createTask() {
    const input = document.getElementById('task-input');
    const priority = document.getElementById('priority-select').value;
    const errorEl = document.getElementById('create-error');
    errorEl.textContent = '';

    const title = input.value.trim();
    if (!title) { errorEl.textContent = 'Escribe un título para la tarea.'; return; }

    const res = await fetch(API, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ title, priority }),
    });
    const json = await res.json();

    if (json.success) {
      input.value = '';
      loadTasks();
    } else {
      errorEl.textContent = json.error;
    }
  }

  async function toggleDone(id, done) {
    await fetch(`${API}/${id}`, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ done }),
    });
    loadTasks();
  }

  async function deleteTask(id) {
    await fetch(`${API}/${id}`, { method: 'DELETE' });
    loadTasks();
  }

  function setFilter(filter, btn) {
    currentFilter = filter;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    loadTasks();
  }

  function escapeHtml(text) {
    const div = document.createElement('div');
    div.appendChild(document.createTextNode(text));
    return div.innerHTML;
  }

  // Permite crear tarea con Enter
  document.getElementById('task-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') createTask();
  });

  loadTasks();
</script>

</body>
</html>
